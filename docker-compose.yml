version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowledger-postgres
    environment:
      POSTGRES_DB: flowledger
      POSTGRES_USER: flowledger
      POSTGRES_PASSWORD: flowledger
    ports:
      - "5432:5432"
    volumes:
      - flowledger_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowledger -d flowledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: flowledger-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - flowledger_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/flowledger || true;
      mc anonymous set download local/flowledger/public || true;
      exit 0;
      "

volumes:
  flowledger_pg_data:
  flowledger_minio_data:
