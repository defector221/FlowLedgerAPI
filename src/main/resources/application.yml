spring:
  application:
    name: flowledger-api
  datasource:
    url: jdbc:postgresql://localhost:5432/flowledger
    username: flowledger
    password: flowledger
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 7070
  # Reachable via Cloudflare tunnel / docker (not only loopback IPv6)
  address: 0.0.0.0
  forward-headers-strategy: framework
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

flowledger:
  jwt:
    secret: ${JWT_SECRET:FlowLedgerDevSecretKeyMustBeAtLeast256BitsLongForHS256Security!!}
    access-token-expiry-minutes: 30
    refresh-token-expiry-days: 14
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000,https://flowledger.valiantxgroup.com,https://apiflowledger.valiantxgroup.com
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
      access-key: ${MINIO_ACCESS_KEY:admin}
      secret-key: ${MINIO_SECRET_KEY:Vayupa@2024@wan}
      bucket: ${MINIO_BUCKET:flowledger}
  app:
    frontend-url: ${FRONTEND_URL:https://flowledger.valiantxgroup.com}
    public-api-url: ${PUBLIC_API_URL:https://apiflowledger.valiantxgroup.com}
    allow-negative-stock-default: false
  search:
    enabled: ${FLOWLEDGER_SEARCH_ENABLED:true}
    url: ${FLOWLEDGER_SEARCH_URL:https://localhost:19200}
    index: ${FLOWLEDGER_SEARCH_INDEX:flowledger-global-search-v1}
    username: ${FLOWLEDGER_SEARCH_USERNAME:admin}
    password: ${FLOWLEDGER_SEARCH_PASSWORD:Vayupa2024wan}
    ssl-verify: ${FLOWLEDGER_SEARCH_SSL_VERIFY:false}
  # Notification channels (unified NotificationService → email / WhatsApp / in-app)
  notifications:
    email:
      # Local default: true (MailHog on localhost:1025). Set FLOWLEDGER_EMAIL_ENABLED=false to use mock.
      # When true, uses spring.mail.* via SmtpEmailNotificationService.
      enabled: ${FLOWLEDGER_EMAIL_ENABLED:true}
      from-email: ${FLOWLEDGER_EMAIL_FROM:noreply@flowledger.local}
      from-name: ${FLOWLEDGER_EMAIL_FROM_NAME:FlowLedger}
    whatsapp:
      enabled: ${FLOWLEDGER_WHATSAPP_ENABLED:false}
      # mock today; future: meta | twilio
      provider: ${FLOWLEDGER_WHATSAPP_PROVIDER:mock}

logging:
  level:
    root: INFO
    com.flowledger: DEBUG
    org.hibernate.SQL: DEBUG
    com.flowledger.common.security: DEBUG
