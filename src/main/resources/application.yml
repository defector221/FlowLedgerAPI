spring:
  application:
    name: flowledger-api
  datasource:
    url: jdbc:postgresql://localhost:5432/flowledger
    username: flowledger
    password: flowledger
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

flowledger:
  jwt:
    secret: ${JWT_SECRET:FlowLedgerDevSecretKeyMustBeAtLeast256BitsLongForHS256Security!!}
    access-token-expiry-minutes: 30
    refresh-token-expiry-days: 14
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:19000}
      access-key: ${MINIO_ACCESS_KEY:admin}
      secret-key: ${MINIO_SECRET_KEY:Vayupa@2024@wan}
      bucket: ${MINIO_BUCKET:flowledger}
  app:
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    allow-negative-stock-default: false
  # Notification channels (email SMTP vs mock; WhatsApp is always mock until a provider is wired)
  notifications:
    email:
      # When false (default), emails are logged by MockEmailNotificationService.
      # When true, uses spring.mail.* via SmtpEmailNotificationService.
      enabled: ${FLOWLEDGER_EMAIL_ENABLED:false}
    whatsapp:
      # Placeholder for a future provider; MockWhatsAppNotificationService is used today.
      enabled: ${FLOWLEDGER_WHATSAPP_ENABLED:false}

logging:
  level:
    root: INFO
    com.flowledger: DEBUG
    org.hibernate.SQL: DEBUG
    com.flowledger.common.security: DEBUG
